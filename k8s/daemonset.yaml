apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpf-repeater
  namespace: default
  labels:
    app: ebpf-repeater
spec:
  selector:
    matchLabels:
      app: ebpf-repeater
  template:
    metadata:
      labels:
        app: ebpf-repeater
    spec:
      hostPID: true
      tolerations:
      - operator: Exists
      containers:
      - name: ebpf-repeater
        image: ebpf-repeater:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        volumeMounts:
        - name: sys-kernel-debug
          mountPath: /sys/kernel/debug
          readOnly: false
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: COLLECTOR_ADDR
          value: "collector-service.default.svc.cluster.local:9000"
      volumes:
      - name: sys-kernel-debug
        hostPath:
          path: /sys/kernel/debug
          type: DirectoryOrCreate
