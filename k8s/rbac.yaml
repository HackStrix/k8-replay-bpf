apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edge-pod-reader
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edge-pod-reader-binding
subjects:
- kind: ServiceAccount
  name: default
  namespace: default # Adjust if running in a different namespace
roleRef:
  kind: ClusterRole
  name: edge-pod-reader
  apiGroup: rbac.authorization.k8s.io
